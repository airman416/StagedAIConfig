name: Fill Carousel Pipeline

# Scheduled workflows run from the default branch (main).
# Two UTC crons for 11:00 AM and 4:00 PM Eastern (currently EDT/UTC-4).
on:
  schedule:
    - cron: "0 15 * * *" # 11:00 AM Eastern (currently EDT)
    - cron: "0 20 * * *" # 4:00 PM Eastern (currently EDT)
  workflow_dispatch:

concurrency:
  group: fill-carousel
  cancel-in-progress: false

env:
  NTFY_TOPIC: stagedai-fill-carousel

jobs:
  fill-carousel:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Log Eastern time for debugging
        run: |
          export TZ=America/New_York
          echo "Running at $(date +%H:%M) Eastern ($(date +%Z))"

      - name: Run fill pipeline (random nook, upload to TikTok draft)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ZERNIO_API_KEY: ${{ secrets.ZERNIO_API_KEY }}
        run: python main.py -f -y

      - name: Upload debug artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-debug-${{ github.run_id }}
          path: |
            carousel_*/
            generated_source_*
          if-no-files-found: ignore

  notify-success:
    needs: fill-carousel
    if: success() && needs.fill-carousel.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: ntfy — success
        run: |
          curl -sS -f \
            -H "Authorization: Bearer ${{ secrets.NTFY_API_KEY }}" \
            -H "Title: TikTok fill carousel posted" \
            -H "Tags: white_check_mark" \
            -H "Priority: default" \
            -d "Fill pipeline finished. TikTok inbox draft should be ready.
          Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            "https://ntfy.sh/${{ env.NTFY_TOPIC }}"

  notify-failure:
    needs: fill-carousel
    if: failure() && needs.fill-carousel.result == 'failure'
    runs-on: ubuntu-latest
    steps:
      - name: ntfy — failure
        run: |
          echo "::error::Fill carousel pipeline failed."
          curl -sS -f \
            -H "Authorization: Bearer ${{ secrets.NTFY_API_KEY }}" \
            -H "Title: TikTok fill carousel FAILED" \
            -H "Tags: rotating_light" \
            -H "Priority: urgent" \
            -d "Fill pipeline failed. Check Actions logs.
          Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            "https://ntfy.sh/${{ env.NTFY_TOPIC }}" || true
